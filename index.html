<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimum Stock Blood Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=20260614">
</head>

<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰ เมนู</button>
<div id="sideOverlay" class="side-overlay" onclick="toggleSidebar(false)"></div>

<div class="app-layout">
  <aside id="sideMenu" class="side-menu">
    <div class="side-title">Blood Stock</div>

    <button class="side-btn" onclick="showDashboardPage('upload', this)">
      📤 Upload File
    </button>

    <button class="side-btn active" onclick="showDashboardPage('minimum', this)">
      📊 Minimum Stock
    </button>

    <button class="side-btn" onclick="showDashboardPage('expiry', this)">
      ⏳ Expiry Risk
    </button>

    <button class="side-btn" onclick="showDashboardPage('mobile', this)">
      🚌 Mobile Unit Planning
    </button>
  </aside>

  <main>

    <section id="page-upload" class="dashboard-page">
  <div id="uploadSection" class="hero-card mt-4">
      <div class="mb-4">
        <h1 class="fw-bold mb-2">อัปโหลดไฟล์ใหม่ (ย้อนหลัง 2 ปี)</h1>
        <div class="small-muted">
          อัปโหลดไฟล์ Excel เพื่อคำนวณ Minimum Stock รอบใหม่
        </div>
      </div>

      <div id="uploadZone" class="upload-zone">
        <div class="fs-1 mb-2">📁</div>
        <h5 class="fw-bold mb-2">ลากไฟล์ Excel มาวางตรงนี้</h5>
        <div class="small-muted mb-3">หรือกดเพื่อเลือกไฟล์ .xlsx</div>
        <input id="fileInput" type="file" accept=".xlsx,.xls" hidden />
        <button class="btn btn-main" type="button">เลือกไฟล์ Excel</button>
      </div>

      <div class="mt-3">
        <div class="small-muted">ไฟล์ที่เลือก</div>
        <div id="fileName" class="fw-bold">ยังไม่ได้เลือกไฟล์</div>
      </div>

      <button id="uploadBtn" class="btn btn-main w-100 mt-4" disabled>
        อัปโหลดและคำนวณ Minimum Stock
      </button>

      <div id="statusBox" class="status-box"></div>

      <div id="loadingBox" class="status-box" style="display:none;">
        <div class="fw-bold mb-1">⏳ กำลังประมวลผลไฟล์ใหญ่</div>
        <div class="small-muted">ระบบกำลังอ่าน Excel, แปลงวันที่ และคำนวณ Minimum Stock กรุณารอสักครู่</div>
        <div class="progress mt-3" style="height: 10px;">
          <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%;"></div>
        </div>
      </div>
  </div>
</section>
    
    <section id="page-minimum" class="dashboard-page active">
      <div id="topDashboard" class="mb-4"></div>
    </section>

    <section id="page-expiry" class="dashboard-page">
  <div id="expiryRiskDashboard"></div>
</section>

    <section id="page-mobile" class="dashboard-page">
  <div id="mobilePlanningDashboard"></div>
</section>

    

          <div id="dashboard" class="mt-4" style="display:none;"></div>
    </div>
  </main>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="nice-modal">
    <div id="modalIcon" class="modal-icon">✅</div>
    <h4 id="modalTitle" class="fw-bold mb-2">สำเร็จ</h4>
    <div id="modalMessage" class="small-muted mb-4"></div>
    <button class="btn btn-main w-100" onclick="closeModal()">รับทราบ</button>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="supabase-config.js?v=20260617-fastload"></script>
  <script src="supabase-backend.js?v=20260617-fastload"></script>
  <script src="script.js?v=20260617-fastload"></script>
</body>
</html>
