<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimum Stock Blood Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Sarabun", sans-serif;
      background: linear-gradient(135deg, #eef7ff, #f8fbff);
      min-height: 100vh;
      color: #16324f;
    }

    .app-shell {
      max-width: 980px;
      margin: auto;
      padding: 32px 16px;
    }

    .hero-card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(120,180,230,0.3);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(30, 90, 150, 0.12);
      padding: 28px;
    }

    .upload-zone {
      border: 2px dashed #7bbcf2;
      border-radius: 24px;
      padding: 36px 20px;
      text-align: center;
      background: #f7fbff;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      background: #eaf6ff;
      transform: translateY(-2px);
    }

    .btn-main {
      background: linear-gradient(135deg, #1887d9, #43b0f1);
      border: 0;
      border-radius: 16px;
      padding: 12px 22px;
      font-weight: 800;
      color: white;
    }

    .btn-main:disabled {
      opacity: 0.55;
    }

    .status-box {
      border-radius: 18px;
      padding: 14px 16px;
      background: #eef7ff;
      border: 1px solid #c8e6ff;
      margin-top: 16px;
      display: none;
    }

    .small-muted {
      color: #6b8298;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <div class="hero-card">
      <div class="mb-4">
        <h1 class="fw-bold mb-2">Minimum Stock Blood Bank</h1>
        <div class="small-muted">
          อัปโหลดไฟล์ Excel เพื่อคำนวณ Minimum Stock จากรายการ Released
        </div>
      </div>

      <div id="uploadZone" class="upload-zone">
        <div class="fs-1 mb-2">📁</div>
        <h5 class="fw-bold mb-2">ลากไฟล์ Excel มาวางตรงนี้</h5>
        <div class="small-muted mb-3">หรือกดเพื่อเลือกไฟล์ .xlsx</div>
        <input id="fileInput" type="file" accept=".xlsx,.xls" hidden />
        <button class="btn btn-main" type="button">เลือกไฟล์ Excel</button>
      </div>

      <div class="mt-3">
        <div class="small-muted">ไฟล์ที่เลือก</div>
        <div id="fileName" class="fw-bold">ยังไม่ได้เลือกไฟล์</div>
      </div>

      <button id="uploadBtn" class="btn btn-main w-100 mt-4" disabled>
        อัปโหลดและคำนวณ Minimum Stock
      </button>

      <div id="statusBox" class="status-box"></div>
    </div>
  </main>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOcuADXBhegKJzgNODfyX2MfafMJmQ0ZP1k0Q0AxeeI5FAj1_716evZDFOCvHn9iIw/exec";

    const uploadZone = document.getElementById("uploadZone");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("statusBox");

    let selectedFile = null;

    uploadZone.addEventListener("click", () => fileInput.click());

    uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });

    uploadZone.addEventListener("dragleave", () => {
      uploadZone.classList.remove("dragover");
    });

    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
      handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file) return;

      const ok = file.name.toLowerCase().endsWith(".xlsx") || file.name.toLowerCase().endsWith(".xls");
      if (!ok) {
        showStatus("กรุณาเลือกไฟล์ Excel เท่านั้น", false);
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      uploadBtn.disabled = false;
      showStatus("เลือกไฟล์แล้ว พร้อมอัปโหลด", true);
    }

    uploadBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = "กำลังอัปโหลด...";
      showStatus("กำลังส่งไฟล์ไปยังระบบ กรุณารอสักครู่", true);

      try {
        const base64 = await fileToBase64(selectedFile);

        const formData = new FormData();
        formData.append("action", "uploadExcel");
        formData.append("fileName", selectedFile.name);
        formData.append("fileBase64", base64);

        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "อัปโหลดไม่สำเร็จ");
        }

        showStatus("✅ อัปโหลดสำเร็จ: " + data.fileName, true);

      } catch (err) {
        showStatus("❌ " + err.message, false);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "อัปโหลดและคำนวณ Minimum Stock";
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(",")[1];
          resolve(base64);
        };

        reader.onerror = () => reject(new Error("อ่านไฟล์ไม่สำเร็จ"));
        reader.readAsDataURL(file);
      });
    }

    function showStatus(message, good) {
      statusBox.style.display = "block";
      statusBox.style.background = good ? "#eef7ff" : "#fff1f1";
      statusBox.style.borderColor = good ? "#c8e6ff" : "#ffc9c9";
      statusBox.textContent = message;
    }
  </script>
</body>
</html>
